<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Interview Mastery Guide</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --accent-cyan: #00fff7;
            --accent-pink: #ff2a6d;
            --accent-yellow: #ffd700;
            --text-primary: #e8eaf6;
            --text-secondary: #b0b8d4;
            --glass-bg: rgba(26, 31, 58, 0.7);
            --glass-border: rgba(0, 255, 247, 0.2);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 255, 247, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 42, 109, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%);
            animation: bgShift 20s ease infinite;
        }

        @keyframes bgShift {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(50px, 30px) scale(1.1);
            }
        }

        /* Grid Pattern Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                linear-gradient(rgba(0, 255, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 247, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 50px 50px;
            }
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-size: 0.8rem;
            color: rgba(0, 255, 247, 0.7);
            /* increased visibility */
            font-weight: 700;
            letter-spacing: 2px;
            z-index: 1000;
            text-transform: uppercase;
            animation: pulse 2.5s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(0, 255, 247, 0.6);
            /* glow effect */
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
                text-shadow: 0 0 5px rgba(0, 255, 247, 0.3);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(101, 255, 250, 0.9);
            }

            100% {
                opacity: 0.4;
                text-shadow: 0 0 5px rgba(0, 255, 247, 0.3);
            }
        }

        /* Header */
        header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: titleGlow 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
        }

        @keyframes titleGlow {

            0%,
            100% {
                filter: brightness(1) drop-shadow(0 0 20px rgba(0, 255, 247, 0.3));
            }

            50% {
                filter: brightness(1.2) drop-shadow(0 0 40px rgba(255, 42, 109, 0.4));
            }
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 2rem;
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }

        .search-box {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* Question Cards */
        .question-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-pink));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .question-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 255, 247, 0.2);
        }

        .question-card:hover::before {
            opacity: 1;
        }

        .question-card.active {
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 40px rgba(0, 255, 247, 0.3);
        }

        .question-card.active::before {
            opacity: 1;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .question-number {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            color: var(--bg-primary);
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-cyan);
            flex: 1;
            line-height: 1.6;
        }

        .expand-icon {
            color: var(--accent-pink);
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .question-card.active .expand-icon {
            transform: rotate(180deg);
        }

        .answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            margin-top: 0;
        }

        .question-card.active .answer {
            max-height: 3000px;
            margin-top: 1.5rem;
        }

        .answer-content {
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 255, 247, 0.2);
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .answer-content p {
            margin-bottom: 1rem;
        }

        .answer-content strong {
            color: var(--accent-yellow);
            font-weight: 600;
        }

        .answer-content ul {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .answer-content li {
            margin-bottom: 0.5rem;
            position: relative;
        }

        .answer-content li::marker {
            color: var(--accent-cyan);
        }

        .code-inline {
            background: rgba(0, 255, 247, 0.1);
            color: var(--accent-cyan);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .pros-cons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .pros,
        .cons {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid;
        }

        .pros {
            border-color: rgba(0, 255, 0, 0.3);
        }

        .cons {
            border-color: rgba(255, 42, 109, 0.3);
        }

        .pros h4,
        .cons h4 {
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
        }

        .pros h4 {
            color: #00ff88;
        }

        .cons h4 {
            color: var(--accent-pink);
        }

        /* Category Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 3rem;
            padding: 0 2rem;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            color: var(--bg-primary);
            border-color: transparent;
            font-weight: 600;
        }

        /* Scroll to Top */
        .scroll-top {
            position: fixed;
            bottom: 80px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .scroll-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-top:hover {
            box-shadow: 0 0 30px rgba(0, 255, 247, 0.5);
            transform: translateY(-5px);
        }

        .scroll-top::before {
            content: '↑';
            font-size: 1.5rem;
            color: var(--bg-primary);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .question-number {
                font-size: 0.75rem;
                padding: 0.3rem 0.6rem;
            }

            .question-text {
                font-size: 1rem;
            }

            .watermark {
                bottom: 10px;
                right: 15px;
                font-size: 0.65rem;
            }

            .scroll-top {
                bottom: 60px;
                right: 15px;
            }
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
            color: var(--accent-cyan);
            font-size: 1.2rem;
        }

        .spinner {
            border: 3px solid rgba(0, 255, 247, 0.2);
            border-top: 3px solid var(--accent-cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    <div class="watermark">Sarita Gomi</div>

    <header>
        <h1 class="title">Node.js Interview Mastery</h1>
        <p class="subtitle">Complete Guide with Interview-Ready Answers</p>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="🔍 Search questions..." id="searchInput">
    </div>

    <div class="filters">
        <button class="filter-btn active" data-category="all">All Topics</button>
        <button class="filter-btn" data-category="core">Core Concepts</button>
        <button class="filter-btn" data-category="performance">Performance</button>
        <button class="filter-btn" data-category="security">Security</button>
        <button class="filter-btn" data-category="database">Database</button>
        <button class="filter-btn" data-category="architecture">Architecture</button>
    </div>

    <div class="container" id="questionsContainer">
        <div class="loading">
            <div class="spinner"></div>
            Loading questions...
        </div>
    </div>

    <div class="scroll-top" id="scrollTop"></div>

    <script>
        const questions = [
            {
                id: 1,
                category: 'core',
                question: 'What is Node.js?',
                answer: `<p><strong>Node.js</strong> is a runtime environment that allows you to run JavaScript on the server-side, outside the browser.</p>
                <p><strong>Key Points:</strong></p>
                <ul>
                    <li>Built on Chrome's V8 JavaScript engine</li>
                    <li>Event-driven, non-blocking I/O model makes it lightweight and efficient</li>
                    <li>Uses JavaScript for both frontend and backend</li>
                    <li>Perfect for I/O-intensive applications (real-time apps, APIs, microservices)</li>
                    <li>Single-threaded but handles concurrency through event loop</li>
                </ul>
                <p><strong>Interview Tip:</strong> Emphasize that Node.js is NOT a language or framework—it's a runtime environment.</p>`
            },
            {
                id: 2,
                category: 'core',
                question: 'What is the Event Loop?',
                answer: `<p>The <strong>Event Loop</strong> is the mechanism that allows Node.js to perform non-blocking I/O operations despite JavaScript being single-threaded.</p>
                <p><strong>How it works:</strong></p>
                <ul>
                    <li><strong>Call Stack:</strong> Executes synchronous code</li>
                    <li><strong>Node APIs:</strong> Handle async operations (timers, I/O, etc.)</li>
                    <li><strong>Callback Queue:</strong> Holds callbacks from completed async operations</li>
                    <li><strong>Event Loop:</strong> Moves callbacks from queue to call stack when stack is empty</li>
                </ul>
                <p><strong>Phases:</strong> Timers → Pending Callbacks → Idle/Prepare → Poll → Check → Close Callbacks</p>
                <p><strong>Interview Tip:</strong> Explain that the event loop enables Node.js to handle thousands of concurrent connections without blocking.</p>`
            },
            {
                id: 3,
                category: 'core',
                question: 'What is setImmediate, and what is the difference between setImmediate and setInterval?',
                answer: `<p><strong>setImmediate:</strong> Executes a callback <em>once</em> in the next iteration of the event loop (check phase).</p>
                <p><strong>setInterval:</strong> Executes a callback <em>repeatedly</em> at specified time intervals.</p>
                <p><strong>Key Differences:</strong></p>
                <ul>
                    <li><code class="code-inline">setImmediate()</code> runs once, immediately after I/O events</li>
                    <li><code class="code-inline">setInterval()</code> runs repeatedly at fixed intervals</li>
                    <li>setImmediate is unique to Node.js; setInterval exists in browsers too</li>
                    <li>setImmediate has higher priority than <code class="code-inline">setTimeout(fn, 0)</code> in I/O cycles</li>
                </ul>
                <p><strong>Interview Tip:</strong> Mention that <code class="code-inline">process.nextTick()</code> has even higher priority than setImmediate.</p>`
            },
            {
                id: 4,
                category: 'core',
                question: 'What is libuv, and how is it different from Node.js?',
                answer: `<p><strong>libuv</strong> is a C library that provides the event loop and asynchronous I/O capabilities to Node.js.</p>
                <p><strong>Relationship:</strong></p>
                <ul>
                    <li>Node.js = V8 Engine (JavaScript execution) + libuv (async I/O) + C++ bindings</li>
                    <li>libuv handles thread pool, file system operations, networking, timers</li>
                    <li>Provides cross-platform async I/O (works on Windows, Linux, macOS)</li>
                </ul>
                <p><strong>Key Features of libuv:</strong></p>
                <ul>
                    <li>Event loop implementation</li>
                    <li>Thread pool (default 4 threads) for CPU-intensive tasks</li>
                    <li>Async DNS, TCP, UDP operations</li>
                    <li>File system operations</li>
                </ul>
                <p><strong>Interview Tip:</strong> Node.js is the runtime; libuv is the underlying engine that powers its async capabilities.</p>`
            },
            {
                id: 5,
                category: 'performance',
                question: 'What is multithreading, and how can it be performed in Node.js?',
                answer: `<p><strong>Multithreading</strong> means running multiple threads concurrently to perform parallel operations.</p>
                <p><strong>In Node.js:</strong></p>
                <ul>
                    <li>Node.js is single-threaded for JavaScript execution</li>
                    <li>But libuv's thread pool (default 4 threads) handles I/O operations</li>
                    <li>For true multithreading: Use <strong>Worker Threads</strong> module</li>
                </ul>
                <p><strong>Worker Threads:</strong></p>
                <ul>
                    <li>Create separate threads for CPU-intensive tasks</li>
                    <li>Each worker runs in its own V8 instance</li>
                    <li>Communicate via message passing</li>
                    <li>Example: Image processing, video encoding, complex calculations</li>
                </ul>
                <p><strong>Interview Tip:</strong> Mention that Worker Threads are for CPU-bound tasks, while the event loop handles I/O-bound tasks efficiently.</p>`
            },
            {
                id: 6,
                category: 'core',
                question: 'What are Buffers?',
                answer: `<p><strong>Buffers</strong> are temporary storage for binary data in Node.js, used when dealing with raw binary data (files, network streams, images).</p>
                <p><strong>Key Points:</strong></p>
                <ul>
                    <li>Fixed-size chunk of memory allocated outside V8 heap</li>
                    <li>Used for handling binary data (TCP streams, file operations, images)</li>
                    <li>Created using <code class="code-inline">Buffer.from()</code>, <code class="code-inline">Buffer.alloc()</code></li>
                    <li>Can convert between Buffer and String using encodings (utf8, base64, hex)</li>
                </ul>
                <p><strong>Common Use Cases:</strong></p>
                <ul>
                    <li>Reading/writing files</li>
                    <li>Network communication (TCP/UDP)</li>
                    <li>Image processing</li>
                    <li>Cryptographic operations</li>
                </ul>
                <p><strong>Interview Tip:</strong> Explain that Buffers are necessary because JavaScript wasn't originally designed to handle binary data.</p>`
            },
            {
                id: 7,
                category: 'core',
                question: 'What are Streams?',
                answer: `<p><strong>Streams</strong> are objects that allow reading or writing data piece by piece (in chunks), instead of loading everything into memory at once.</p>
                <p><strong>4 Types of Streams:</strong></p>
                <ul>
                    <li><strong>Readable:</strong> Read data (e.g., <code class="code-inline">fs.createReadStream()</code>)</li>
                    <li><strong>Writable:</strong> Write data (e.g., <code class="code-inline">fs.createWriteStream()</code>)</li>
                    <li><strong>Duplex:</strong> Both read and write (e.g., TCP sockets)</li>
                    <li><strong>Transform:</strong> Modify data while reading/writing (e.g., compression)</li>
                </ul>
                <p><strong>Advantages:</strong></p>
                <ul>
                    <li>Memory efficient—process large files without loading entirely</li>
                    <li>Time efficient—start processing before all data is available</li>
                    <li>Perfect for video streaming, file uploads, large datasets</li>
                </ul>
                <p><strong>Interview Tip:</strong> Use the example: "Streaming Netflix vs downloading the entire movie first."</p>`
            },
            {
                id: 8,
                category: 'core',
                question: 'What are Transform Streams?',
                answer: `<p><strong>Transform Streams</strong> are a type of duplex stream that can modify or transform data as it's being read or written.</p>
                <p><strong>Characteristics:</strong></p>
                <ul>
                    <li>Both readable and writable</li>
                    <li>Data can be modified during transmission</li>
                    <li>Common examples: compression (zlib), encryption, data parsing</li>
                </ul>
                <p><strong>Real-world Examples:</strong></p>
                <ul>
                    <li><strong>zlib.createGzip():</strong> Compress data on-the-fly</li>
                    <li><strong>crypto streams:</strong> Encrypt/decrypt data</li>
                    <li><strong>CSV parsers:</strong> Transform CSV to JSON while reading</li>
                    <li><strong>Custom transforms:</strong> Uppercase text, filter data, etc.</li>
                </ul>
                <p><strong>Interview Tip:</strong> Mention that transform streams are powerful for data pipelines where data needs processing between source and destination.</p>`
            },
            {
                id: 9,
                category: 'performance',
                question: 'How can you optimize Node.js performance?',
                answer: `<p><strong>Performance Optimization Strategies:</strong></p>
                <ul>
                    <li><strong>Use Clustering:</strong> Leverage multiple CPU cores with cluster module</li>
                    <li><strong>Implement Caching:</strong> Use Redis/Memcached for frequently accessed data</li>
                    <li><strong>Optimize Database Queries:</strong> Use indexing, connection pooling, query optimization</li>
                    <li><strong>Use Worker Threads:</strong> For CPU-intensive tasks</li>
                    <li><strong>Enable Compression:</strong> Use gzip/brotli for HTTP responses</li>
                    <li><strong>Async Operations:</strong> Avoid blocking the event loop; use async/await properly</li>
                    <li><strong>Load Balancing:</strong> Distribute traffic across multiple instances</li>
                    <li><strong>Code Optimization:</strong> Avoid memory leaks, use efficient algorithms</li>
                    <li><strong>Use PM2:</strong> Process manager for production with auto-restart, monitoring</li>
                    <li><strong>HTTP/2:</strong> Enable for better performance over HTTP/1.1</li>
                </ul>
                <p><strong>Interview Tip:</strong> Prioritize optimizations based on bottlenecks—profile first, then optimize.</p>`
            },
            {
                id: 10,
                category: 'performance',
                question: 'What are Cluster and Worker Threads?',
                answer: `<p><strong>Cluster Module:</strong></p>
                <ul>
                    <li>Creates multiple Node.js processes (workers) to handle requests</li>
                    <li>Each worker is a separate process running on different CPU cores</li>
                    <li>Master process distributes incoming connections to workers</li>
                    <li><strong>Use case:</strong> Scale web servers across multiple cores</li>
                </ul>
                <p><strong>Worker Threads Module:</strong></p>
                <ul>
                    <li>Creates threads within the same process</li>
                    <li>Each thread runs JavaScript in parallel</li>
                    <li>Shares memory with main thread (via SharedArrayBuffer)</li>
                    <li><strong>Use case:</strong> CPU-intensive tasks (image processing, heavy computations)</li>
                </ul>
                <div class="pros-cons">
                    <div class="pros">
                        <h4>✓ When to Use Cluster</h4>
                        <ul>
                            <li>I/O-bound workloads (APIs, web servers)</li>
                            <li>Horizontal scaling across cores</li>
                        </ul>
                    </div>
                    <div class="cons">
                        <h4>✓ When to Use Worker Threads</h4>
                        <ul>
                            <li>CPU-bound tasks</li>
                            <li>Shared memory requirements</li>
                        </ul>
                    </div>
                </div>`
            },
            {
                id: 11,
                category: 'core',
                question: 'What is a Process and what is a Thread?',
                answer: `<p><strong>Process:</strong></p>
                <ul>
                    <li>Independent execution unit with its own memory space</li>
                    <li>Isolated from other processes</li>
                    <li>Heavier—requires more resources</li>
                    <li>Inter-process communication (IPC) is complex</li>
                    <li><strong>Example:</strong> Each Node.js cluster worker is a separate process</li>
                </ul>
                <p><strong>Thread:</strong></p>
                <ul>
                    <li>Lightweight execution unit within a process</li>
                    <li>Shares memory space with other threads in the same process</li>

        renderQuestions(questions);
